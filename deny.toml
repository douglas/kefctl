# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/

[advisories]
# Deny crates with known security vulnerabilities
vulnerability = "deny"
# Warn on unmaintained crates (not blocking, but worth tracking)
unmaintained = "warn"
# Warn on crates that have been yanked from crates.io
yanked = "warn"

[licenses]
# Accepted SPDX license identifiers for all transitive dependencies
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
]

[bans]
# Warn when multiple versions of the same crate are pulled in transitively
multiple-versions = "warn"

[sources]
# Only allow crates from crates.io — no unknown registries or git sources
unknown-registry = "deny"
unknown-git = "deny"
